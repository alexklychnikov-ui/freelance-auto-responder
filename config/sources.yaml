sources:
  - id: kwork_dev_it
    platform: kwork
    enabled: true
    url: https://kwork.ru/projects?c=11
    scan_interval_minutes: 15
    bootstrap: true

  - id: kwork_c5
    platform: kwork
    enabled: true
    url: https://kwork.ru/projects?c=5
    scan_interval_minutes: 15
    bootstrap: true

  - id: kwork_c15
    platform: kwork
    enabled: true
    url: https://kwork.ru/projects?c=15
    scan_interval_minutes: 15
    bootstrap: true

  - id: flru_orders
    platform: flru
    enabled: true
    url: https://www.fl.ru/projects/?kind=1
    scan_interval_minutes: 30
    bootstrap: true
    filters:
      skip_closed: true
      skip_vacancy: true

  - id: flru_ai
    platform: flru
    enabled: false
    url: https://www.fl.ru/projects/category/ai-iskusstvenniy-intellekt/
    scan_interval_minutes: 45
    filters:
      listing_types: [order]
      skip_fulltime: true

  # Будущие площадки (адаптеры не реализованы)
  - id: freelance_ru_dev
    platform: freelance_ru
    enabled: false
    url: https://freelance.ru/projects/
    scan_interval_minutes: 30

  - id: yandex_uslugi_it
    platform: yandex_uslugi
    enabled: true
    url: https://uslugi.yandex.ru/cab/orders?completely_moderated=1&rubric=4479&rubric=4772&rubric=4781&rubric=4789&type=new
    scan_interval_minutes: 30
    bootstrap: true

  - id: tg_job_webdev
    platform: telegram
    enabled: false
    channel: "@job_webdev"
    scan_interval_minutes: 15
    last_message_id: 0
